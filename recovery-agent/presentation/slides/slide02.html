<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #ffffff; font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  background: #1C2833; padding: 20pt 30pt; margin: 0;
}
.header h1 {
  color: #ffffff; font-size: 22pt; margin: 0; font-weight: bold;
}
.content {
  padding: 25pt 35pt; flex: 1;
}
.section-title {
  color: #667eea; font-size: 14pt; font-weight: bold;
  margin-bottom: 15pt; text-transform: uppercase; letter-spacing: 1pt;
}
.fact-grid {
  display: flex; flex-wrap: wrap; gap: 15pt; margin-bottom: 25pt;
}
.fact-box {
  background: #F4F6F6; border-left: 4pt solid #E74C3C;
  padding: 12pt 15pt; width: 145pt;
}
.fact-box p {
  color: #2E4053; font-size: 11pt; margin: 0; line-height: 1.4;
}
.quote-box {
  background: #1C2833; padding: 18pt 25pt; margin-top: 10pt;
}
.quote-box p {
  color: #ffffff; font-size: 13pt; font-style: italic; margin: 0;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="header">
  <h1>Motivation: Why Recovery is the Bottleneck</h1>
</div>
<div class="content">
  <p class="section-title">Physical Lab Reality</p>
  <div class="fact-grid">
    <div class="fact-box"><p>Devices fail unexpectedly</p></div>
    <div class="fact-box"><p>Communication interrupts</p></div>
    <div class="fact-box"><p>Control systems drift</p></div>
    <div class="fact-box"><p>Irreversible actions exist</p></div>
  </div>
  <div class="quote-box">
    <p>Planning agents fail at the boundary between reasoning and physical execution.</p>
  </div>
</div>
</body>
</html>
